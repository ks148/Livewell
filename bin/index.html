<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Livewell – Bin Assignment</title>

<style>
body{font-family:Arial;background:#f7f9fc;padding:20px}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:15px}
input{padding:10px;font-size:18px}
button{padding:10px 15px;margin-right:10px}
</style>
</head>

<body>

<div class="card">
<h2>Bin Assignment</h2>

Zone: <input id="zoneInput" value=""><br><br>
Bay: <input id="bayInput" value="01"><br><br>
Shelf: <span id="shelfDisplay">01</span><br><br>
Bin: <span id="binDisplay">01</span><br><br>

<input id="scan" placeholder="Scan item or control code"><br><br>

<button onclick="undoLast()">Undo</button>
</div>

<div class="card">
<h3>Assignments</h3>
<table border="1" width="100%" id="table">
<thead>
<tr>
<th>#</th>
<th>Item</th>
<th>Bin</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>

const END_SHELF_CODE = 'LW-END-SHELF';
const END_BAY_CODE = 'LW-END-BAY';

let assignments = [];
let history = [];

let currentZone = '';
let currentBay = 1;
let currentShelf = 1;
let currentBin = 1;

function pad(n){
  return String(n).padStart(2,'0');
}

function buildBin(){
  if(!currentZone) return '—';
  return `${currentZone}-${pad(currentBay)}-${pad(currentShelf)}-${pad(currentBin)}`;
}

function updateUI(){
  document.getElementById('shelfDisplay').innerText = pad(currentShelf);
  document.getElementById('binDisplay').innerText = pad(currentBin);
}

function render(){
  const tbody = document.querySelector("#table tbody");
  tbody.innerHTML = "";

  assignments.forEach((a,i)=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${i+1}</td>
      <td>${a.item}</td>
      <td>${a.bin}</td>
    `;
    tbody.appendChild(tr);
  });
}

function snapshot(){
  return {
    zone: currentZone,
    bay: currentBay,
    shelf: currentShelf,
    bin: currentBin
  };
}

function restore(s){
  currentZone = s.zone;
  currentBay = s.bay;
  currentShelf = s.shelf;
  currentBin = s.bin;
}

function handleControl(code){

  // 🔥 ALWAYS ADVANCE — NO BLOCKING

  if(code === END_SHELF_CODE){

    const before = snapshot();

    currentShelf++;
    currentBin = 1;

    history.push({type:'control', before});

    updateUI();
    return true;
  }

  if(code === END_BAY_CODE){

    const before = snapshot();

    currentBay++;
    currentShelf = 1;
    currentBin = 1;

    history.push({type:'control', before});

    updateUI();
    return true;
  }

  return false;
}

function addItem(item){

  const before = snapshot();

  const bin = buildBin();

  assignments.push({
    item,
    bin
  });

  currentBin++;

  history.push({
    type:'item',
    before
  });

  render();
  updateUI();
}

function undoLast(){

  if(!history.length) return;

  const last = history.pop();

  if(last.type === 'item'){
    assignments.pop();
  }

  restore(last.before);

  render();
  updateUI();
}

document.getElementById('scan').addEventListener('keydown', e=>{
  if(e.key !== 'Enter') return;

  const val = e.target.value.trim();
  e.target.value = "";

  currentZone = document.getElementById('zoneInput').value.trim().toUpperCase();
  currentBay = Number(document.getElementById('bayInput').value) || 1;

  const upper = val.toUpperCase();

  if(handleControl(upper)) return;

  addItem(val);
});

updateUI();

</script>

</body>
</html>
