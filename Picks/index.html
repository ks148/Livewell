<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Livewell – Picks</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:system-ui;margin:20px;background:#f4f6f9}
.topnav{position:sticky;top:0;background:#fff;padding:10px;border-radius:14px;margin-bottom:16px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.card{background:#fff;padding:16px;border-radius:14px;margin-bottom:16px}
button{padding:8px 14px;border-radius:10px;border:1px solid #ccc;font-weight:700;cursor:pointer}
.primary{background:#2563eb;color:#fff}
.ghost{background:#111827;color:#fff}
.scanbox{font-size:22px;padding:10px;width:320px}
.miniBtn{padding:6px 10px;font-weight:900}
.mono{font-family:monospace}
</style>
</head>

<body>

<h1>Picks</h1>

<div class="card">
<button onclick="buildPick()">Build Pick</button>
<button onclick="toggleConfirmMode()">Confirm</button>
</div>

<div class="card" id="confirmCard" style="display:none">
<input id="confirmScan" class="scanbox" placeholder="Scan...">
<button onclick="resetConfirmed()">Reset</button>
<div id="scanStatus"></div>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Barcode</th><th>SKU</th><th>Title</th><th>WH Bin</th><th>WH</th>
<th>PLY Plan</th><th>PLY Pick</th>
<th>GH Plan</th><th>GH Pick</th>
<th>Adjust</th>
</tr>
</thead>
<tbody id="results"></tbody>
</table>
</div>

<script>

/******** CONFIG ********/
const COL_BARCODE = 'Variant Barcode';
const COL_TITLE = 'Title';
const COL_WH_BIN = 'Variant Metafield: custom.wh_bin [single_line_text_field]';

let rows = [];
let lastPick = [];
let pickIndex = new Map();
let confirmMode = false;
let currentIdx = 0;

/******** CSV LOAD ********/
fetch('../pickle-data.csv')
.then(r=>r.text())
.then(text=>{
  const lines = text.split('\n');
  const headers = lines[0].split(',');
  rows = lines.slice(1).map(l=>{
    const vals = l.split(',');
    let obj = {};
    headers.forEach((h,i)=>obj[h]=vals[i]);
    return obj;
  });
});

/******** SORT ********/
function sortByBin(a,b){
  const sa = (a.r[COL_WH_BIN]||'').split('-');
  const sb = (b.r[COL_WH_BIN]||'').split('-');

  for(let i=0;i<sa.length;i++){
    if(i===0){
      if(sa[i]!==sb[i]) return sa[i].localeCompare(sb[i]);
    } else {
      let na=parseInt(sa[i]), nb=parseInt(sb[i]);
      if(na!==nb) return na-nb;
    }
  }
  return 0;
}

/******** HELPERS ********/
function isComplete(p){
  return (p.plyPicked>=p.plyPlan && p.ghPicked>=p.ghPlan);
}

function moveToNextItem(){
  for(let i=currentIdx+1;i<lastPick.length;i++){
    if(!isComplete(lastPick[i])){
      currentIdx=i;
      renderTable();
      document.getElementById('scanStatus').innerText = 'NEXT BIN: ' + lastPick[i].r[COL_WH_BIN];
      return;
    }
  }
  document.getElementById('scanStatus').innerText='PICK COMPLETE';
}

function forceComplete(idx){
  if(idx!==currentIdx) return;

  const p = lastPick[idx];
  p.plyPicked = p.plyPlan;
  p.ghPicked = p.ghPlan;

  moveToNextItem();
  renderTable();
}

/******** BUILD PICK ********/
function buildPick(){
  lastPick=[];
  pickIndex.clear();

  rows.forEach(r=>{
    if(!r[COL_BARCODE]) return;

    const item={
      r,
      plyPlan:2,
      ghPlan:1,
      plyPicked:0,
      ghPicked:0
    };

    const idx=lastPick.length;
    lastPick.push(item);
    pickIndex.set(r[COL_BARCODE], idx);
  });

  lastPick.sort(sortByBin);
  currentIdx=0;

  renderTable();
}

/******** TABLE ********/
function renderTable(){
  lastPick.sort(sortByBin);

  const tbody=document.getElementById('results');
  tbody.innerHTML='';

  lastPick.forEach((p,idx)=>{
    const tr=document.createElement('tr');

    if(confirmMode && idx===currentIdx){
      tr.style.background='#dbeafe';
      tr.style.fontWeight='900';
    }

    tr.innerHTML=`
    <td>${p.r[COL_BARCODE]}</td>
    <td>${p.r['Variant SKU']||''}</td>
    <td>${p.r[COL_TITLE]}</td>
    <td>${p.r[COL_WH_BIN]}</td>
    <td>--</td>
    <td>${p.plyPlan}</td>
    <td>${p.plyPicked}</td>
    <td>${p.ghPlan}</td>
    <td>${p.ghPicked}</td>
    <td>
      <button class="miniBtn" onclick="adjust(${idx},'ply',1)">+PLY</button>
      <button class="miniBtn" onclick="adjust(${idx},'gh',1)">+GH</button>
      <button class="miniBtn" onclick="forceComplete(${idx})">Done</button>
    </td>
    `;
    tbody.appendChild(tr);
  });
}

/******** ADJUST ********/
function adjust(idx,type,val){
  if(!confirmMode || idx!==currentIdx) return;

  if(type==='ply') lastPick[idx].plyPicked+=val;
  if(type==='gh') lastPick[idx].ghPicked+=val;

  if(isComplete(lastPick[idx])) moveToNextItem();

  renderTable();
}

/******** SCAN ********/
document.getElementById('confirmScan').addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const q=e.target.value.trim();
    e.target.value='';

    const idx=pickIndex.get(q);

    if(idx===undefined){
      document.getElementById('scanStatus').innerText='NOT IN PICK';
      return;
    }

    if(idx!==currentIdx){
      document.getElementById('scanStatus').innerText='WRONG BIN';
      return;
    }

    lastPick[idx].plyPicked++;

    if(isComplete(lastPick[idx])) moveToNextItem();

    renderTable();
  }
});

/******** CONFIRM MODE ********/
function toggleConfirmMode(){
  confirmMode=!confirmMode;
  document.getElementById('confirmCard').style.display=confirmMode?'block':'none';

  if(confirmMode){
    currentIdx=0;
  }

  renderTable();
}

function resetConfirmed(){
  lastPick.forEach(p=>{
    p.plyPicked=0;
    p.ghPicked=0;
  });
  currentIdx=0;
  renderTable();
}

</script>

</body>
</html>
